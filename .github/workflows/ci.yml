name: 'CI'

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ 'main' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  audit:
    name: 'PRD Compliance & Performance Audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unified PRD Audit
        run: npm run report
