name: 'publish'

on:
  push:
    tags:
      - 'v*' # Triggers the build whenever you push a tag starting with v (e.g. v1.0.0)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish-tauri:
    permissions:
      contents: write # Crucial: Allows the action to create the release and upload files
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin' # Build for Apple Silicon
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'  # Build for Intel Mac
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''

    runs-on: "${{ matrix.platform }}"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # targets are required for cross-compiling Mac builds
          targets: "${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}"

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm run test

      - name: Run Performance Benchmarks
        run: npx vitest bench --run

      - name: Build & Publish App
        uses: tauri-apps/tauri-action@v0.5.12
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "${{ github.ref_name }}" # Uses the pushed version tag name
          releaseName: 'Feather MD v__VERSION__'
          releaseBody: 'See the files below to download and install this release.'
          releaseDraft: true # Sets as a draft first so you can edit before publishing
          prerelease: false
          args: "${{ matrix.args }}"
